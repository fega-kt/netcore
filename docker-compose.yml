services:
  fileconverter:
    build: .
    image: fileconverter:latest
    container_name: fileconverter
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - LibreOffice__ExecutablePath=/usr/bin/libreoffice
    volumes:
      - /tmp/fileconverter:/tmp/file-converter
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
