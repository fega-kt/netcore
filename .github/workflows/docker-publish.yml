name: Build and Push Docker Image

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get git info
        id: git
        run: |
          echo "commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "author=$(git log -1 --pretty=format:'%an')" >> $GITHUB_OUTPUT
          echo "branch=$(git rev-parse --abbrev-ref HEAD)" >> $GITHUB_OUTPUT
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

          # 👉 Lấy FULL commit message + body thật
          MESSAGE=$(git log -1 --pretty=format:'%B')

          # fallback nếu rỗng (hiếm nhưng nên có)
          if [ -z "$MESSAGE" ]; then
            MESSAGE="${{ github.event.head_commit.message }}"
          fi

          # flatten để không vỡ Docker build-arg
          MESSAGE=$(echo "$MESSAGE" | tr '\n' ' ' | sed 's/"/\\"/g')

          echo "message=$MESSAGE" >> $GITHUB_OUTPUT

      - name: Print debug info
        run: |
          echo "Commit: ${{ steps.git.outputs.commit }}"
          echo "Branch: ${{ steps.git.outputs.branch }}"
          echo "Message: ${{ steps.git.outputs.message }}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.git.outputs.commit }}
          build-args: |
            GIT_COMMIT=${{ steps.git.outputs.commit }}
            GIT_AUTHOR=${{ steps.git.outputs.author }}
            GIT_BRANCH=${{ steps.git.outputs.branch }}
            GIT_MESSAGE=${{ steps.git.outputs.message }}
            BUILD_TIME=${{ steps.git.outputs.build_time }}

      - name: Trigger Deploy
        if: ${{ secrets.NETCORE_DEPLOY_HOOK != '' }}
        run: |
          echo "Triggering Render deploy..."
          curl -v -X POST ${{ secrets.NETCORE_DEPLOY_HOOK }}

      - name: Skip deploy (no hook)
        if: ${{ secrets.NETCORE_DEPLOY_HOOK == '' }}
        run: echo "No NETCORE_DEPLOY_HOOK provided, skipping deploy"
